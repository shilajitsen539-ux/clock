<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Futuristic Clock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #040810;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
    }
    .clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem;
      background: #080c14;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
    }
    canvas { display: block; }
    .digital-row {
      display: flex;
      gap: 20px;
      margin-top: 1.6rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }
    .digi-box {
      background: #0d1525;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 8px 18px;
      text-align: center;
      min-width: 72px;
    }
    .digi-label { font-size: 10px; color: #3a6fa8; letter-spacing: 0.15em; }
    .digi-val   { font-size: 22px; color: #7eb8f7; font-weight: 700; }
    .digi-sep   { font-size: 28px; color: #1e3a5f; font-weight: 700; }
    .date-strip {
      margin-top: 1rem;
      font-size: 12px;
      color: #2e567a;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    /* hidden #watch for index.js compatibility */
    #watch { display: none; }
  </style>
</head>
<body>
  <div class="clock-wrap">
    <canvas id="clockCanvas" width="300" height="300"></canvas>

    <div class="digital-row">
      <div class="digi-box"><div class="digi-label">HRS</div><div class="digi-val" id="dh">00</div></div>
      <div class="digi-sep">:</div>
      <div class="digi-box"><div class="digi-label">MIN</div><div class="digi-val" id="dm">00</div></div>
      <div class="digi-sep">:</div>
      <div class="digi-box"><div class="digi-label">SEC</div><div class="digi-val" id="ds">00</div></div>
    </div>

    <div class="date-strip" id="date-strip"></div>
  </div>

  <!-- Original span kept for index.js — hidden visually -->
  <h1 style="display:none">The Real Time Is: <span id="watch"></span></h1>

  <script src="index.js"></script>

  <script>
    const canvas = document.getElementById('clockCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2, R = 130;

    function pad(n) { return String(n).padStart(2,'0'); }

    function draw() {
      const now = new Date();
      const h = now.getHours() % 12, m = now.getMinutes(),
            s = now.getSeconds(), ms = now.getMilliseconds();

      const sA = ((s + ms/1000) / 60) * Math.PI*2 - Math.PI/2;
      const mA = ((m + (s+ms/1000)/60) / 60) * Math.PI*2 - Math.PI/2;
      const hA = ((h + m/60 + s/3600) / 12) * Math.PI*2 - Math.PI/2;

      ctx.clearRect(0, 0, W, H);

      // outer ring
      ctx.beginPath(); ctx.arc(cx,cy,R+6,0,Math.PI*2);
      ctx.strokeStyle='#0a1f3a'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,R+3,0,Math.PI*2);
      ctx.strokeStyle='#1a3a6a'; ctx.lineWidth=1; ctx.stroke();

      // face
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
      ctx.fillStyle='#07101e'; ctx.fill();
      ctx.strokeStyle='#1e4080'; ctx.lineWidth=2; ctx.stroke();

      // grid lines
      ctx.save(); ctx.globalAlpha=0.07;
      for(let i=0;i<12;i++){
        const a=(i/12)*Math.PI*2;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(a)*R*0.96, cy+Math.sin(a)*R*0.96);
        ctx.strokeStyle='#2060c0'; ctx.lineWidth=0.5; ctx.stroke();
      }
      ctx.restore();

      // inner rings
      ctx.save(); ctx.globalAlpha=0.18;
      [0.72, 0.45].forEach(f=>{
        ctx.beginPath(); ctx.arc(cx,cy,R*f,0,Math.PI*2);
        ctx.strokeStyle='#2866c8'; ctx.lineWidth=0.5; ctx.stroke();
      });
      ctx.restore();

      // second sweep arc
      ctx.beginPath();
      ctx.arc(cx,cy,R-2,-Math.PI/2,-Math.PI/2+(s/60)*Math.PI*2);
      ctx.strokeStyle='#0a3a6a'; ctx.lineWidth=3; ctx.stroke();

      // tick marks
      for(let i=0;i<60;i++){
        const a=(i/60)*Math.PI*2-Math.PI/2, maj=i%5===0;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*(maj?R-14:R-7), cy+Math.sin(a)*(maj?R-14:R-7));
        ctx.lineTo(cx+Math.cos(a)*(R-2), cy+Math.sin(a)*(R-2));
        ctx.strokeStyle=maj?'#3a80d0':'#1a3555';
        ctx.lineWidth=maj?2:0.8; ctx.stroke();
      }

      // numbers
      ctx.font='500 13px Courier New';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#5aaaf0';
      for(let i=1;i<=12;i++){
        const a=(i/12)*Math.PI*2-Math.PI/2;
        ctx.fillText(i, cx+Math.cos(a)*(R-26), cy+Math.sin(a)*(R-26));
      }

      // hands
      function hand(angle,len,width,color){
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
        ctx.beginPath(); ctx.moveTo(0,len*0.18); ctx.lineTo(0,-len);
        ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineCap='round'; ctx.stroke();
        ctx.restore();
      }
      hand(hA, R*0.52, 4, '#5aaaf0');
      hand(mA, R*0.74, 2.5, '#7ec8f8');
      hand(sA, R*0.88, 1.2, '#e05050');

      // second hand tip dot
      ctx.save();
      ctx.translate(cx+Math.cos(sA)*R*0.88, cy+Math.sin(sA)*R*0.88);
      ctx.beginPath(); ctx.arc(0,0,3.5,0,Math.PI*2);
      ctx.fillStyle='#e05050'; ctx.fill();
      ctx.restore();

      // center pin
      ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
      ctx.fillStyle='#1a4a8a'; ctx.fill();
      ctx.strokeStyle='#7eb8f7'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2);
      ctx.fillStyle='#e05050'; ctx.fill();

      // digital readout
      document.getElementById('dh').textContent = pad(now.getHours());
      document.getElementById('dm').textContent = pad(now.getMinutes());
      document.getElementById('ds').textContent = pad(now.getSeconds());

      const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      document.getElementById('date-strip').textContent =
        days[now.getDay()] + '  ·  ' + now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
